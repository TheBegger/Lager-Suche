<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Die Große Lagersuchmaschine</title>
<style>
  body{font-family:system-ui;max-width:900px;margin:32px auto;padding:20px}
  h1{font-size:32px;margin:0 0 14px}
  input{width:100%;font-size:20px;padding:16px;border-radius:12px;border:1px solid #ccc;margin:12px 0 14px}
  .muted{color:#666;margin:8px 0}
  .item{padding:14px 0;border-bottom:1px solid #eee}
  .loc{font-weight:800;margin-top:6px}
  .meta{color:#555;font-size:14px;margin-top:4px}

  .banner{
    background:#d00000;color:#fff;font-weight:900;
    padding:12px 14px;border-radius:12px;margin:0 0 16px;
    text-align:center;letter-spacing:.2px;
    animation: blink 1s steps(2, jump-none) infinite;
  }
  @keyframes blink{ 0%{opacity:1} 50%{opacity:.15} 100%{opacity:1} }

  .actions{display:flex;gap:10px;align-items:center;margin:10px 0 18px}
  .btn{
    border:1px solid #ccc;background:#fff;border-radius:12px;
    padding:10px 12px;font-size:14px;font-weight:700;
  }

  dialog{
    width:min(560px, 96vw);
    border:none;border-radius:16px;padding:16px 16px 12px;
    box-shadow:0 10px 40px rgba(0,0,0,.2);
  }
  dialog::backdrop{background:rgba(0,0,0,.35)}
  textarea{
    width:100%;min-height:120px;resize:vertical;
    font-size:16px;padding:12px;border-radius:12px;border:1px solid #ccc;
  }
  .dlg-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:10px}
</style>
</head>
<body>

<div class="banner">Noch in bearbeitung - Media &amp; Kreativteam</div>

<h1>Die Große Lagersuchmaschine</h1>
<input id="q" placeholder="Was suchst du? (Name, Alias, SKU, EAN)" autocomplete="off">

<div class="actions">
  <button class="btn" id="bugBtn" type="button">Du hast einen Fehler gefunden?</button>
  <div id="status" class="muted">Lade Daten…</div>
</div>

<div id="results"></div>

<dialog id="bugDialog">
  <h3 style="margin:0 0 10px;">Fehler melden</h3>
  <div class="muted" style="margin:0 0 10px;">
    Öffnet deine Mail-App mit einer vorgefüllten Nachricht.
  </div>
  <textarea id="bugText" placeholder="Was stimmt nicht? (Artikel, Lagerplatz, Tippfehler, etc.)"></textarea>
  <div class="dlg-actions">
    <button class="btn" id="cancelBug" type="button">Abbrechen</button>
    <button class="btn" id="sendBug" type="button">Mail erstellen</button>
  </div>
</dialog>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQkmfxeyM39IFCaumNzHV-WmWqSkZ7efxPrV_tRbKRe_ggInNgtoJEx5xozv-PzyEbfdHQ3EQ9kusdf/pub?output=csv";
const BUG_MAIL_TO = "timo.b@me.com";

let rows = [];

function normalize(s){
  return (s||"").toString().toLowerCase().trim()
    .replace(/[ä]/g,"ae").replace(/[ö]/g,"oe").replace(/[ü]/g,"ue").replace(/[ß]/g,"ss");
}
function tokens(q){
  return normalize(q).replace(/[^a-z0-9]+/g," ").split(/\s+/).filter(Boolean);
}

// Robust CSV parser (Kommas in "..." ok)
function parseCSV(text){
  const out = [];
  let i=0, field="", row=[], inQuotes=false;

  while(i < text.length){
    const c = text[i];
    if(inQuotes){
      if(c === '"' && text[i+1] === '"'){ field += '"'; i += 2; continue; }
      if(c === '"'){ inQuotes=false; i++; continue; }
      field += c; i++; continue;
    } else {
      if(c === '"'){ inQuotes=true; i++; continue; }
      if(c === ','){ row.push(field); field=""; i++; continue; }
      if(c === '\n' || c === '\r'){
        if(c === '\r' && text[i+1] === '\n') i++;
        row.push(field); field="";
        if(row.some(v => (v||"").trim() !== "")) out.push(row);
        row=[]; i++; continue;
      }
      field += c; i++; continue;
    }
  }
  row.push(field);
  if(row.some(v => (v||"").trim() !== "")) out.push(row);

  const headers = (out.shift()||[]).map(h => (h||"").trim());
  return out.map(cols => {
    const obj = {};
    headers.forEach((h, idx) => obj[h] = (cols[idx]||"").trim());
    return obj;
  });
}

function getName(r){ return r.name || r.Bezeichnung || ""; }
function getLocRaw(r){ return r.location || r.Ablageplatz || r.ablageplatz || ""; }

function formatLocation(locRaw){
  if(!locRaw) return "";

  let loc = locRaw.toString().trim();

  // Text-Orte
  const simple = loc.replace(/\s+/g," ").trim();
  const simpleNorm = normalize(simple);
  if(["kueche","kuche","wand","offen"].includes(simpleNorm)){
    const pretty = (simpleNorm === "kueche" || simpleNorm === "kuche") ? "Küche"
                  : simple[0].toUpperCase()+simple.slice(1);
    return `Liegt in ${pretty}`;
  }

  // "S1 Türe r/l"
  let mDoor = simple.match(/^([SRL])\s*\.?\s*(\d+)\s+t(ü|ue)re\s+([rl])$/i);
  if(mDoor){
    const schrank = mDoor[2];
    const side = mDoor[4].toLowerCase() === "r" ? "rechts" : "links";
    return `Liegt an Schrank ${schrank}, Türe ${side}`;
  }

  // Codes: S3.4.6.5 / S.3.4.6.5 / R.1.2.10 / R1.1.3 / L.1.1.1
  let code = loc.replace(/\s+/g,"").replace(/\.$/,"");
  const m = code.match(/^([SRL])\.?(\d+(?:\.\d+){0,3})$/i);
  if(!m) return `Liegt bei: ${locRaw}`;

  const parts = m[2].split(".");
  const labels = ["Schrank", "Regal", "Fach", "Unterfach"];
  let txt = "Liegt in ";
  for(let i=0;i<parts.length && i<labels.length;i++){
    txt += `${labels[i]} ${parts[i]}${i < parts.length-1 ? ", " : ""}`;
  }
  return txt;
}

function render(list, q){
  const el = document.getElementById("results");
  el.innerHTML = "";

  if(!q){ el.innerHTML = `<div class="muted">Tippe zum Suchen…</div>`; return; }
  if(list.length === 0){ el.innerHTML = `<div class="muted">Kein Treffer.</div>`; return; }

  list.slice(0, 30).forEach(r=>{
    const name = getName(r);
    const sku = r.sku || "";
    const ean = r.ean || "";
    const mb  = r.mindestbestand || "";
    const loc = getLocRaw(r);

    el.innerHTML += `
      <div class="item">
        <div><b>${name || "(ohne Name)"}</b> ${sku ? `(${sku})` : ""}</div>
        <div class="loc">${formatLocation(loc)}</div>
        <div class="meta">
          ${ean ? `EAN: ${ean}` : ``}
          ${(ean && mb) ? ` · ` : ``}
          ${mb ? `Mindestbestand: ${mb}` : ``}
        </div>
      </div>
    `;
  });
}

function matchesRow(r, toks){
  const hay = normalize([ getName(r), r.aliases, r.sku, r.ean ].filter(Boolean).join(" "));
  return toks.every(t => hay.includes(t));
}

function search(q){
  const el = document.getElementById("results");
  const qn = normalize(q);

  if(qn.includes("robin")){
    el.innerHTML = `
      <div style="color:red;font-weight:900;font-size:20px;padding:16px 0;">
        Robin hat damit nichts zu tun, such selbst!
      </div>`;
    return;
  }

  const toks = tokens(q);
  if(toks.length === 0){ render([], ""); return; }

  const hits = rows.filter(r => matchesRow(r, toks));
  render(hits, q);
}

// ---- Bug report mailto ----
const bugBtn = document.getElementById("bugBtn");
const bugDialog = document.getElementById("bugDialog");
const bugText = document.getElementById("bugText");
document.getElementById("cancelBug").addEventListener("click", ()=>bugDialog.close());

bugBtn.addEventListener("click", ()=>{
  bugText.value = "";
  bugDialog.showModal();
});

document.getElementById("sendBug").addEventListener("click", ()=>{
  const msg = bugText.value.trim();
  const currentQuery = document.getElementById("q").value.trim();

  const subject = "Lagersuche – Fehler gefunden";
  const body =
`Hi Timo,

ich habe einen Fehler gefunden:

${msg || "(keine Details eingegeben)"}

Aktuelle Suche: ${currentQuery || "(leer)"}

— automatisch erstellt von der Lagersuche`;

  const mailto = `mailto:${encodeURIComponent(BUG_MAIL_TO)}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  window.location.href = mailto;
  bugDialog.close();
});

// ---- init ----
(async function init(){
  const status = document.getElementById("status");
  try{
    const res = await fetch(CSV_URL, { cache: "no-store" });
    const txt = await res.text();
    rows = parseCSV(txt);
    status.textContent = `Bereit. ${rows.length} Artikel geladen.`;
    document.getElementById("q").addEventListener("input", e => search(e.target.value));
    render([], "");
  } catch(e){
    status.textContent = "Fehler beim Laden der Daten.";
  }
})();
</script>

</body>
</html>
