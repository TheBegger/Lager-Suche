<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Die Große Lagersuchmaschine</title>

<style>
body{
font-family:system-ui;
max-width:800px;
margin:40px auto;
padding:20px;
}

h1{
font-size:32px;
margin-bottom:20px;
}

input{
width:100%;
font-size:20px;
padding:16px;
border-radius:12px;
border:1px solid #ccc;
margin-bottom:20px;
}

.item{
padding:14px 0;
border-bottom:1px solid #eee;
}

.loc{
font-weight:700;
margin-top:4px;
}

.meta{
color:#555;
font-size:14px;
}
</style>
</head>

<body>

<h1>Die Große Lagersuchmaschine</h1>

<input id="q" placeholder="Was suchst du?">

<div id="results"></div>

<script>

const CSV_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vQkmfxeyM39IFCaumNzHV-WmWqSkZ7efxPrV_tRbKRe_ggInNgtoJEx5xozv-PzyEbfdHQ3EQ9kusdf/pub?output=csv";

let rows=[];

function normalize(s){
return (s||"")
.toLowerCase()
.replace(/[ä]/g,"ae")
.replace(/[ö]/g,"oe")
.replace(/[ü]/g,"ue")
.replace(/[ß]/g,"ss");
}

function parseCSV(text){

const lines=text.trim().split(/\r?\n/);

const headers=lines[0].split(",");

return lines.slice(1).map(line=>{

const cols=line.split(",");

let obj={};

headers.forEach((h,i)=>{
obj[h.trim()]=(cols[i]||"").trim();
});

return obj;

});
}

function formatLocation(loc){

if(!loc)return "";

let s=loc.replace(/\.$/,"");

s=s.replace("S","");

const p=s.split(".");

let txt="Liegt in ";

if(p[0]) txt+="Schrank "+p[0];
if(p[1]) txt+=", Regal "+p[1];
if(p[2]) txt+=", Fach "+p[2];
if(p[3]) txt+=", Unterfach "+p[3];

return txt;

}

function render(list){

const el=document.getElementById("results");

el.innerHTML="";

list.forEach(r=>{

const loc=r.location||r.Ablageplatz||"";

el.innerHTML+=`

<div class="item">

<div><b>${r.name||r.Bezeichnung||""}</b></div>

<div class="meta">${r.sku||""}</div>

<div class="loc">${formatLocation(loc)}</div>

</div>

`;

});

}

function search(q){

q=normalize(q);

if(!q){
render([]);
return;
}

const hits=rows.filter(r=>{

const text=normalize(

(r.name||"")+" "+  
(r.Bezeichnung||"")+" "+
(r.aliases||"")+" "+
(r.sku||"")+" "+
(r.ean||"")

);

return text.includes(q);

});

render(hits);

}

fetch(CSV_URL)

.then(r=>r.text())

.then(t=>{

rows=parseCSV(t);

document.getElementById("q").addEventListener("input",e=>search(e.target.value));

});

</script>

</body>
</html>
